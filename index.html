<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Converter</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        input {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 2px dashed #444444;
            border-radius: 8px;
            padding: 20px 40px;
            margin-bottom: 20px;
            cursor: pointer;
            width: 500px;
        }

        button {
            background-color: #00bcd4;
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 14px 0;
            width: 500px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #00a5bb;
        }
    </style>
</head>
<body>
    <h1>DEVICE Data Converter</h1>
    <input type="file" id="fileInput" multiple accept=".txt">
    <button onclick="convertFiles()">Convert to CSV</button>
</body>

<script>
    function convertFiles() {
        const input = document.getElementById("fileInput")
        const files = input.files

        if (files.length === 0) {
            alert("Please select some files first!")
            return
        }

        let allRows = []
        let headers = null
        let filesRead = 0

        for (let i = 0; i < files.length; i++) {
            const reader = new FileReader()

            reader.onload = function(e) {
                const lines = e.target.result.split("\n")

                if (headers === null) {
                    headers = lines[0]
                }

                for (let j = 1; j < lines.length; j++) {
                    if (lines[j].trim() !== "") {
                        allRows.push(lines[j] + "\t" + files[i].name)
                    }
                }

                filesRead++
                if (filesRead === files.length) {
                    const csvContent = headers + "\tSource File\n" + allRows.join("\n")

                    const blob = new Blob([csvContent], { type: "text/csv" })
                    const url = URL.createObjectURL(blob)

                    const a = document.createElement("a")
                    a.href = url
                    a.download = "merged_device_data.csv"
                    a.click()
                }
            }

            reader.readAsText(files[i])
        }
    }
</script>
</html>
